<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Python Power User</title>
<script>
  // GitHub Pages SPA redirect: preserves the path as a hash route
  // e.g. /Python-Power-User/s/variables → /Python-Power-User/#/s/variables
  var path = window.location.pathname;
  var repo = '/Python-Power-User';
  if (path.startsWith(repo)) {
    var route = path.slice(repo.length);
    if (route && route !== '/') {
      window.location.replace(repo + '/#' + route);
    } else {
      window.location.replace(repo + '/');
    }
  } else {
    window.location.replace(repo + '/');
  }
</script>
</head>
<body>
  <p>Redirecting&hellip;</p>
</body>
</html>
